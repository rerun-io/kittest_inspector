# Copied from https://github.com/rerun-io/rerun_template
#
# https://github.com/EmbarkStudios/cargo-deny
#
# cargo-deny checks our dependency tree for copy-left licenses,
# duplicate dependencies, and rustsec advisories (https://rustsec.org/advisories).
#
# Install: `cargo install cargo-deny`
# Check: `cargo deny check`.


[graph]
targets = [
  { triple = "aarch64-apple-darwin" },
  { triple = "x86_64-apple-darwin" },
  { triple = "x86_64-pc-windows-msvc" },
  { triple = "x86_64-unknown-linux-gnu" },
  { triple = "x86_64-unknown-linux-musl" },
]
all-features = true


[advisories]
version = 2
ignore = []


[bans]
multiple-versions = "deny"
wildcards = "deny"
deny = [
  { name = "openssl", reason = "Use rustls" },
  { name = "openssl-sys", reason = "Use rustls" },
]
skip = []
skip-tree = []


[licenses]
version = 2
private = { ignore = true }
confidence-threshold = 0.93
allow = [
  "Apache-2.0 WITH LLVM-exception",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "ISC",
  "MIT-0",
  "MIT",
  "MPL-2.0",
  "OFL-1.1",
  "OpenSSL",
  "Ubuntu-font-1.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
]
exceptions = []

[[licenses.clarify]]
name = "webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]


[sources]
unknown-registry = "deny"
unknown-git = "deny"

[sources.allow-org]
github = ["emilk", "rerun-io"]
